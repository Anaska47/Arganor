name: Arganor Daily SEO Autopilot

on:
  schedule:
    # Runs at 08:00 UTC every day
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  autopilot:
    runs-on: ubuntu-latest

    steps:
    - name: Trigger Pinterest Automation (Vercel)
      run: |
        curl -X POST "https://arganor.vercel.app/api/pinterest/publish?batch=5" \
        -H "Authorization: Bearer ${{ secrets.ARGANOR_API_KEY }}" \
        -H "Content-Type: application/json" \
        -d '{}'

    - name: Generate Content (Simulated)
      run: echo "Automation triggered successfully on Vercel backend."
